<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Trip Split</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Trip Split">
<meta name="theme-color" content="#4B3480">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/12.15.0/firebase-app-compat.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/12.15.0/firebase-firestore-compat.min.js"></script>
<style>
  :root{
    --navy:#4B3480;
    --navy-2:#5B4293;
    --cream:#F7F2FC;
    --cream-2:#EFE4F8;
    --amber:#E8829E;
    --amber-dark:#8C2F49;
    --teal:#6E9BE0;
    --teal-dark:#1F4C82;
    --coral:#E8829E;
    --coral-dark:#8C2F49;
    --ink:#3A2E5C;
    --muted:#7A7290;
    --line:rgba(75,52,128,0.14);
  }
  *{box-sizing:border-box;}
  body{margin:0;}
  .app{
    font-family:'Inter',sans-serif;
    background:var(--cream);
    color:var(--ink);
    min-height:100vh;
    padding-bottom:3rem;
  }
  .header{
    background:var(--navy);
    color:var(--cream);
    padding:1.75rem 1.5rem 2.25rem;
    position:relative;
    overflow:hidden;
  }
  .header::after{
    content:"";
    position:absolute;
    left:0; right:0; bottom:0;
    height:14px;
    background-image:radial-gradient(circle, var(--cream) 4px, transparent 4.5px);
    background-size:22px 14px;
    background-position:8px 6px;
    background-repeat:repeat-x;
  }
  .eyebrow{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--amber);
    margin:0 0 6px;
  }
  .trip-title{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:28px;
    margin:0 0 14px;
  }
  .traveler-row{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
  }
  .chip{
    font-family:'IBM Plex Mono',monospace;
    font-size:12.5px;
    padding:5px 11px;
    border-radius:999px;
    background:rgba(246,241,228,0.1);
    border:1px solid rgba(246,241,228,0.28);
  }
  .totals-strip{
    display:flex;
    gap:10px;
    padding:14px 1.5rem 0;
    margin-top:-1px;
    overflow-x:auto;
  }
  .total-card{
    flex:1;
    min-width:110px;
    background:#fff;
    border:1px solid var(--line);
    border-radius:10px;
    padding:10px 12px;
  }
  .total-label{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.06em;
    color:var(--muted);
    margin:0 0 3px;
  }
  .total-value{
    font-family:'IBM Plex Mono',monospace;
    font-weight:600;
    font-size:17px;
    margin:0;
    color:var(--teal-dark);
  }
  .tabs{
    display:flex;
    gap:4px;
    padding:1.25rem 1.5rem 0;
  }
  .tab-btn{
    font-family:'Space Grotesk',sans-serif;
    font-weight:500;
    font-size:14px;
    padding:9px 16px;
    border:none;
    background:transparent;
    color:var(--muted);
    cursor:pointer;
    border-radius:8px 8px 0 0;
    border-bottom:2px solid transparent;
  }
  .tab-btn.active{
    color:var(--navy);
    border-bottom:2px solid var(--amber);
    background:var(--cream-2);
  }
  .panel{
    padding:1.25rem 1.5rem 0;
  }
  .card{
    background:#fff;
    border:1px solid var(--line);
    border-radius:12px;
    padding:1.1rem 1.2rem;
  }
  .field{
    margin-bottom:14px;
  }
  .field label{
    display:block;
    font-size:12.5px;
    font-weight:500;
    color:var(--muted);
    margin-bottom:6px;
  }
  .field input[type="text"], .field input[type="number"], .field select{
    width:100%;
    padding:9px 11px;
    font-size:14.5px;
    font-family:'Inter',sans-serif;
    border:1px solid var(--line);
    border-radius:8px;
    background:var(--cream);
    color:var(--ink);
  }
  .field input:focus, .field select:focus{
    outline:none;
    border-color:var(--amber);
  }
  .amount-row{
    display:flex;
    gap:8px;
  }
  .amount-row select{
    width:100px;
    flex-shrink:0;
    padding:9px 8px;
    font-size:14px;
    font-family:'Inter',sans-serif;
    border:1px solid var(--line);
    border-radius:8px;
    background:var(--cream);
    color:var(--ink);
  }
  .amount-row input{
    flex:1;
  }
  .check-grid{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
  }
  .check-pill{
    display:flex;
    align-items:center;
    gap:6px;
    font-size:13.5px;
    padding:7px 12px;
    border-radius:999px;
    border:1px solid var(--line);
    background:var(--cream);
    cursor:pointer;
    user-select:none;
  }
  .check-pill.on{
    background:var(--navy);
    color:var(--cream);
    border-color:var(--navy);
  }
  .check-pill input{display:none;}
  .split-toggle{
    display:flex;
    gap:8px;
    margin-bottom:10px;
  }
  .split-toggle-btn{
    flex:1;
    font-family:'Inter',sans-serif;
    font-size:13px;
    font-weight:500;
    padding:8px 10px;
    border-radius:8px;
    border:1px solid var(--line);
    background:var(--cream);
    color:var(--muted);
    cursor:pointer;
  }
  .split-toggle-btn.active{
    background:var(--navy);
    border-color:var(--navy);
    color:var(--cream);
  }
  .custom-split-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    padding:7px 0;
    border-bottom:1px solid var(--line);
  }
  .custom-split-row:last-of-type{
    border-bottom:none;
  }
  .custom-split-row label{
    font-size:13.5px;
    color:var(--ink);
    margin:0;
  }
  .custom-split-row input{
    width:100px;
    padding:6px 8px;
    font-size:13.5px;
    font-family:'IBM Plex Mono',monospace;
    border:1px solid var(--line);
    border-radius:7px;
    background:#fff;
    color:var(--ink);
    text-align:right;
  }
  .custom-split-total{
    font-size:12.5px;
    margin-top:8px;
    font-family:'IBM Plex Mono',monospace;
  }
  .custom-split-total.ok{ color:var(--teal-dark); }
  .custom-split-total.off{ color:var(--coral-dark); }
  .row-actions{
    display:flex;
    gap:8px;
    margin-top:4px;
  }
  .btn{
    font-family:'Space Grotesk',sans-serif;
    font-weight:500;
    font-size:14px;
    padding:10px 18px;
    border-radius:8px;
    border:1px solid var(--teal-dark);
    background:var(--teal);
    color:#fff;
    cursor:pointer;
  }
  .btn.secondary{
    background:transparent;
    color:var(--navy);
  }
  .btn.small{
    padding:5px 10px;
    font-size:12.5px;
  }
  .hint{
    font-size:12px;
    color:var(--muted);
    margin-top:8px;
  }
  .stub{
    position:relative;
    display:flex;
    background:#fff;
    border:1px solid var(--line);
    border-radius:10px;
    margin-bottom:12px;
    overflow:hidden;
  }
  .stub-main{
    flex:1;
    padding:12px 14px;
  }
  .stub-date{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    letter-spacing:0.05em;
    text-transform:uppercase;
    color:var(--muted);
    margin:0 0 6px;
  }
  .stub-desc{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:16px;
    margin:0 0 6px;
  }
  .stub-paidby{
    font-size:13px;
    color:var(--ink);
    margin:0 0 4px;
  }
  .stub-splitline{
    font-size:13px;
    color:var(--muted);
    margin:0;
  }
  .split-names{
    color:var(--amber-dark);
    font-weight:500;
  }
  .stub-meta{
    font-size:12.5px;
    color:var(--muted);
    margin:0;
  }
  .stub-split{
    position:relative;
    width:96px;
    flex-shrink:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    background:var(--cream-2);
    border-left:1px dashed var(--line);
  }
  .stub-split::before, .stub-split::after{
    content:"";
    position:absolute;
    width:12px; height:12px;
    background:var(--cream);
    border-radius:50%;
    left:-6px;
  }
  .stub-split::before{ top:-6px; }
  .stub-split::after{ bottom:-6px; }
  .stub-amount{
    font-family:'IBM Plex Mono',monospace;
    font-weight:600;
    font-size:16px;
    color:var(--teal-dark);
  }
  .stub-each{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    color:var(--muted);
  }
  .del-btn{
    position:absolute;
    top:6px;
    right:8px;
    background:none;
    border:none;
    color:var(--muted);
    cursor:pointer;
    font-size:13px;
  }
  .empty{
    text-align:center;
    padding:2.5rem 1rem;
    color:var(--muted);
  }
  .board-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:12px 14px;
    background:var(--navy);
    color:var(--cream);
    border-radius:8px;
    margin-bottom:8px;
    font-family:'IBM Plex Mono',monospace;
    flex-wrap:wrap;
    gap:8px;
  }
  .board-row .arrow{
    color:var(--amber);
    margin:0 10px;
  }
  .board-amount{
    font-weight:600;
    font-size:15px;
    color:var(--amber);
    margin-right:auto;
  }
  .pay-btn{
    font-family:'Inter',sans-serif;
    font-size:12px;
    font-weight:500;
    padding:6px 12px;
    border-radius:999px;
    border:none;
    background:var(--teal);
    color:#fff;
    cursor:pointer;
  }
  .settled-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:9px 12px;
    background:var(--cream-2);
    border-radius:8px;
    margin-bottom:6px;
    font-size:13px;
    color:var(--muted);
  }
  .debt-group{
    background:var(--navy);
    border-radius:8px;
    margin-bottom:8px;
    overflow:hidden;
  }
  .debt-group-summary{
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:8px;
    padding:12px 14px;
    color:var(--cream);
    font-family:'IBM Plex Mono',monospace;
    cursor:pointer;
    list-style:none;
  }
  .debt-group-summary::-webkit-details-marker{ display:none; }
  .debt-group-summary .board-amount{
    margin-left:auto;
  }
  .debt-group-items{
    background:var(--cream-2);
    padding:6px 14px;
  }
  .debt-item{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    padding:9px 0;
    border-bottom:1px solid var(--line);
  }
  .debt-item:last-child{ border-bottom:none; }
  .debt-item.paid{
    opacity:0.55;
  }
  .debt-item.paid .debt-item-desc, .debt-item.paid .debt-item-amount{
    text-decoration:line-through;
  }
  .debt-item-info{
    display:flex;
    flex-direction:column;
    gap:2px;
  }
  .debt-item-desc{
    font-size:13.5px;
    color:var(--ink);
  }
  .debt-item-date{
    font-size:11px;
    font-family:'IBM Plex Mono',monospace;
    color:var(--muted);
  }
  .debt-item-amount{
    font-family:'IBM Plex Mono',monospace;
    font-size:13px;
    color:var(--teal-dark);
    margin-left:auto;
  }
  .pay-btn.small{
    font-size:11px;
    padding:5px 10px;
  }
  .undo-btn{
    font-family:'Inter',sans-serif;
    font-size:11.5px;
    background:none;
    border:none;
    color:var(--coral-dark);
    text-decoration:underline;
    cursor:pointer;
  }
  .settled-msg{
    text-align:center;
    padding:2rem 1rem;
    color:var(--teal-dark);
    font-family:'Space Grotesk',sans-serif;
    font-weight:500;
  }
  .balance-list{
    margin-top:18px;
  }
  .balance-item{
    display:flex;
    justify-content:space-between;
    padding:9px 0;
    border-bottom:1px solid var(--line);
    font-size:13.5px;
  }
  .balance-item:last-child{border-bottom:none;}
  .balance-pos{color:var(--teal-dark); font-family:'IBM Plex Mono',monospace;}
  .balance-neg{color:var(--coral-dark); font-family:'IBM Plex Mono',monospace;}
  .section-label{
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:0.07em;
    color:var(--muted);
    margin:20px 0 10px;
  }
  .whoami{
    margin:10px 0 0;
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    color:var(--amber);
  }
  .whoami button{
    background:none;
    border:none;
    color:var(--cream);
    text-decoration:underline;
    cursor:pointer;
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    padding:0;
    margin-left:8px;
    opacity:0.75;
  }
  .profile-gate{
    position:fixed;
    inset:0;
    background:rgba(28,43,69,0.55);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:50;
    padding:1.5rem;
  }
  .profile-gate.show{ display:flex; }
  .profile-card{
    background:var(--cream);
    border-radius:14px;
    padding:1.75rem 1.5rem;
    max-width:340px;
    width:100%;
    text-align:center;
  }
  .profile-title{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:20px;
    margin:0 0 6px;
  }
  .profile-sub{
    font-size:13px;
    color:var(--muted);
    margin:0 0 18px;
  }
  .profile-grid{
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .profile-option{
    font-family:'Space Grotesk',sans-serif;
    font-weight:500;
    font-size:15px;
    padding:11px;
    border-radius:9px;
    border:1px solid var(--line);
    background:#fff;
    cursor:pointer;
  }
  .profile-option:hover{
    border-color:var(--amber);
    background:var(--cream-2);
  }
  .toast{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    background:var(--navy);
    color:var(--cream);
    padding:9px 16px;
    border-radius:8px;
    font-size:13px;
    opacity:0;
    transition:opacity 0.25s;
    pointer-events:none;
  }
  .toast.show{opacity:1;}
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <p class="eyebrow">Trip ledger</p>
    <h1 class="trip-title">London 2026</h1>
    <div class="traveler-row" id="travelerRow"></div>
    <p class="whoami" id="whoami"></p>
  </div>

  <div class="profile-gate" id="profileGate">
    <div class="profile-card">
      <p class="profile-title">Who are you?</p>
      <p class="profile-sub">Pick your name so the app knows who's paying.</p>
      <div class="profile-grid" id="profileGrid"></div>
    </div>
  </div>

  <div class="totals-strip" id="totalsStrip"></div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="add">Add expense</button>
    <button class="tab-btn" data-tab="history">Ledger</button>
    <button class="tab-btn" data-tab="settle">Settle up</button>
  </div>

  <div class="panel" id="panel-add">
    <div class="card">
      <div class="field">
        <label for="desc">What was it</label>
        <input type="text" id="desc" placeholder="Uber to the villa">
      </div>
      <div class="field">
        <label for="amount">Total amount</label>
        <div class="amount-row">
          <select id="currency">
            <option value="$">$ USD</option>
            <option value="£" selected>£ GBP</option>
            <option value="€">€ EUR</option>
          </select>
          <input type="number" id="amount" placeholder="60" step="0.01" min="0">
        </div>
      </div>
      <div class="field">
        <label for="paidBy">Who paid</label>
        <select id="paidBy"></select>
      </div>
      <div class="field">
        <label>Who it affects</label>
        <div class="check-grid" id="affectsGrid"></div>
      </div>
      <div class="field">
        <label>How to split it</label>
        <div class="split-toggle">
          <button type="button" class="split-toggle-btn active" data-mode="even" id="evenBtn">Split evenly</button>
          <button type="button" class="split-toggle-btn" data-mode="custom" id="customBtn">Custom amounts</button>
        </div>
        <div id="customSplitBox" style="display:none;"></div>
      </div>
      <div class="row-actions">
        <button class="btn" id="addBtn">Add to ledger</button>
        <button class="btn secondary" id="clearBtn">Clear</button>
      </div>
      <p class="hint" id="splitHint">Splits evenly across whoever you select. Uncheck names for expenses that don't affect everyone.</p>
    </div>
  </div>

  <div class="panel" id="panel-history" style="display:none;">
    <div id="historyList"></div>
  </div>

  <div class="panel" id="panel-settle" style="display:none;">
    <div id="settleList"></div>
    <div class="balance-list" id="balanceList"></div>
  </div>

</div>

<div class="toast" id="toast">Saved</div>

<script>
const NAMES = ["Kayla","Marian","Eve","Elias","Delali"];
const PROFILE_KEY = "my-profile";
let expenses = [];
let settlements = [];
let myName = null;
let splitMode = 'even';
let customValues = {};

// ---- Firebase setup ----
// Paste your own project's config here (Firebase console > Project settings > Your apps > Config).
// These values are safe to expose publicly — Firestore security rules control who can read/write.
const firebaseConfig = {
  apiKey: "AIzaSyA_onkMJZyNk3ABVC-kyQjxH6SaaHOmv4o",
  authDomain: "london-2026-68de3.firebaseapp.com",
  projectId: "london-2026-68de3",
  storageBucket: "london-2026-68de3.firebasestorage.app",
  messagingSenderId: "937859154617",
  appId: "1:937859154617:web:56276f23243f102af75168",
  measurementId: "G-DJNYX7RXRK"
};
if(typeof firebase === 'undefined'){
  document.body.innerHTML = '<div style="padding:2rem;font-family:sans-serif;text-align:center;color:#8C2F49;">Couldn\'t load Firebase — check your internet connection or try disabling ad-blocking extensions, then reload the page.</div>';
  throw new Error('Firebase SDK failed to load');
}

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
db.settings({ experimentalAutoDetectLongPolling: true, merge: true });
const expensesRef = db.collection("trips").doc("london-2026").collection("expenses");
const settlementsRef = db.collection("trips").doc("london-2026").collection("settlements");

// Approximate fallback rates (units of currency per 1 USD) in case the live lookup fails
let exchangeRates = { '$': 1, '£': 0.79, '€': 0.92 };
const CURRENCY_CODES = { '$': 'USD', '£': 'GBP', '€': 'EUR' };

async function fetchExchangeRates(){
  try{
    const res = await fetch('https://open.er-api.com/v6/latest/USD');
    const data = await res.json();
    if(data && data.rates){
      exchangeRates = {
        '$': 1,
        '£': data.rates.GBP || exchangeRates['£'],
        '€': data.rates.EUR || exchangeRates['€']
      };
      render();
    }
  }catch(e){
    // keep fallback rates
  }
}

function toUSD(amount, currency){
  const rate = exchangeRates[currency] || 1;
  return amount / rate;
}

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1600);
}

function fmt(n, symbol){
  symbol = symbol || '£';
  return symbol + Number(n).toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2});
}

function fmtDate(ts){
  return new Date(ts).toLocaleDateString(undefined, {month:'short', day:'numeric'});
}

async function loadProfile(){
  myName = localStorage.getItem(PROFILE_KEY);
  const gate = document.getElementById('profileGate');
  const whoami = document.getElementById('whoami');
  if(!myName || !NAMES.includes(myName)){
    gate.classList.add('show');
    whoami.innerHTML = '';
  } else {
    gate.classList.remove('show');
    whoami.innerHTML = `Signed in as ${myName} <button id="switchProfile">Switch</button>`;
    document.getElementById('switchProfile').addEventListener('click', () => {
      gate.classList.add('show');
    });
    const paidBy = document.getElementById('paidBy');
    if(paidBy) paidBy.value = myName;
  }
}

async function chooseProfile(name){
  myName = name;
  localStorage.setItem(PROFILE_KEY, name);
  document.getElementById('profileGate').classList.remove('show');
  const paidBy = document.getElementById('paidBy');
  if(paidBy) paidBy.value = name;
  const whoami = document.getElementById('whoami');
  whoami.innerHTML = `Signed in as ${name} <button id="switchProfile">Switch</button>`;
  document.getElementById('switchProfile').addEventListener('click', () => {
    document.getElementById('profileGate').classList.add('show');
  });
}

function initTravelers(){
  const row = document.getElementById('travelerRow');
  row.innerHTML = NAMES.map(n => `<span class="chip">${n}</span>`).join('');

  const paidBy = document.getElementById('paidBy');
  paidBy.innerHTML = NAMES.map(n => `<option value="${n}">${n}</option>`).join('');

  const grid = document.getElementById('affectsGrid');
  grid.innerHTML = NAMES.map(n => `
    <label class="check-pill on" data-name="${n}">
      <input type="checkbox" checked value="${n}"> ${n}
    </label>
  `).join('');
  grid.querySelectorAll('.check-pill').forEach(pill => {
    pill.addEventListener('click', (e) => {
      e.preventDefault();
      const cb = pill.querySelector('input');
      cb.checked = !cb.checked;
      pill.classList.toggle('on', cb.checked);
      renderCustomSplitBox();
    });
  });

  const profileGrid = document.getElementById('profileGrid');
  profileGrid.innerHTML = NAMES.map(n => `<button class="profile-option" data-name="${n}">${n}</button>`).join('');
  profileGrid.querySelectorAll('.profile-option').forEach(btn => {
    btn.addEventListener('click', () => chooseProfile(btn.dataset.name));
  });

  document.getElementById('evenBtn').addEventListener('click', () => setSplitMode('even'));
  document.getElementById('customBtn').addEventListener('click', () => setSplitMode('custom'));
  document.getElementById('amount').addEventListener('input', renderCustomSplitBox);
}

function setSplitMode(mode){
  splitMode = mode;
  document.getElementById('evenBtn').classList.toggle('active', mode === 'even');
  document.getElementById('customBtn').classList.toggle('active', mode === 'custom');
  document.getElementById('customSplitBox').style.display = mode === 'custom' ? 'block' : 'none';
  document.getElementById('splitHint').textContent = mode === 'even'
    ? 'Splits evenly across whoever you select. Uncheck names for expenses that don\'t affect everyone.'
    : 'Enter what each person actually owes — handy when orders aren\'t the same price.';
  if(mode === 'custom') renderCustomSplitBox();
}

function renderCustomSplitBox(){
  if(splitMode !== 'custom') return;
  const checked = Array.from(document.querySelectorAll('#affectsGrid input:checked')).map(cb => cb.value);
  const amount = parseFloat(document.getElementById('amount').value) || 0;
  const currency = document.getElementById('currency').value;
  const box = document.getElementById('customSplitBox');

  if(checked.length === 0){
    box.innerHTML = `<p class="hint">Select who it affects first.</p>`;
    return;
  }

  const evenShare = checked.length ? (amount / checked.length) : 0;
  const rows = checked.map(n => {
    const val = customValues[n] !== undefined ? customValues[n] : (evenShare ? evenShare.toFixed(2) : '');
    return `
      <div class="custom-split-row">
        <label>${n}</label>
        <input type="number" step="0.01" min="0" class="custom-amount-input" data-name="${n}" value="${val}">
      </div>
    `;
  }).join('');

  box.innerHTML = rows + `<p class="custom-split-total" id="customSplitTotal"></p>`;

  box.querySelectorAll('.custom-amount-input').forEach(input => {
    input.addEventListener('input', () => {
      customValues[input.dataset.name] = input.value;
      updateCustomSplitTotal();
    });
  });

  updateCustomSplitTotal();

  function updateCustomSplitTotal(){
    const sum = checked.reduce((s, n) => s + (parseFloat(customValues[n]) || 0), 0);
    const totalEl = document.getElementById('customSplitTotal');
    if(!totalEl) return;
    const diff = amount - sum;
    if(Math.abs(diff) < 0.01){
      totalEl.className = 'custom-split-total ok';
      totalEl.textContent = `Assigned ${fmt(sum, currency)} of ${fmt(amount, currency)} — all set`;
    } else {
      totalEl.className = 'custom-split-total off';
      totalEl.textContent = diff > 0
        ? `Assigned ${fmt(sum, currency)} of ${fmt(amount, currency)} — ${fmt(diff, currency)} left to assign`
        : `Assigned ${fmt(sum, currency)} of ${fmt(amount, currency)} — ${fmt(-diff, currency)} over`;
    }
  }
}

function loadExpenses(){
  expensesRef.onSnapshot((snapshot) => {
    expenses = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    render();
  }, (err) => {
    toast('Could not connect — check your Firebase config');
  });
  settlementsRef.onSnapshot((snapshot) => {
    settlements = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    render();
  }, (err) => {
    toast('Could not load payment history');
  });
}

function markItemPaid(itemId, from, to, amountUSD){
  settlementsRef.doc(itemId).set({ from, to, amount: amountUSD, ts: Date.now() }).catch(() => {
    toast('Could not record payment — try again');
  });
}

function undoItemPaid(itemId){
  settlementsRef.doc(itemId).delete().catch(() => {
    toast('Could not undo — try again');
  });
}

function markGroupPaid(event, from, to){
  event.preventDefault();
  event.stopPropagation();
  const settledIds = new Set(settlements.map(s => s.id));
  const unpaid = buildDebtItems(expenses).filter(it => it.from === from && it.to === to && !settledIds.has(it.itemId));
  if(unpaid.length === 0) return;
  const batch = db.batch();
  unpaid.forEach(it => {
    batch.set(settlementsRef.doc(it.itemId), { from: it.from, to: it.to, amount: it.amount, ts: Date.now() });
  });
  batch.commit().catch(() => {
    toast('Could not record payments — try again');
  });
}

function addExpenseToStore(expense){
  return expensesRef.add(expense).catch(() => {
    toast('Could not save — check your connection');
  });
}

function deleteExpenseFromStore(id){
  return expensesRef.doc(id).delete().catch(() => {
    toast('Could not delete — try again');
  });
}

function addExpense(){
  const desc = document.getElementById('desc').value.trim();
  const amount = parseFloat(document.getElementById('amount').value);
  const currency = document.getElementById('currency').value;
  const paidBy = document.getElementById('paidBy').value;
  const checked = Array.from(document.querySelectorAll('#affectsGrid input:checked')).map(cb => cb.value);

  if(!desc){ toast('Add a description'); return; }
  if(!amount || amount <= 0){ toast('Add a valid amount'); return; }
  if(checked.length === 0){ toast('Select who it affects'); return; }

  const expense = {
    desc, amount, currency, paidBy,
    splitAmong: checked,
    splitType: splitMode,
    ts: Date.now()
  };

  if(splitMode === 'custom'){
    const splitAmounts = {};
    let sum = 0;
    for(const n of checked){
      const v = parseFloat(customValues[n]);
      if(isNaN(v) || v < 0){ toast(`Enter a valid amount for ${n}`); return; }
      splitAmounts[n] = v;
      sum += v;
    }
    if(Math.abs(sum - amount) > 0.01){
      toast(`Amounts add up to ${fmt(sum, currency)}, not ${fmt(amount, currency)}`);
      return;
    }
    expense.splitAmounts = splitAmounts;
  }

  addExpenseToStore(expense);

  document.getElementById('desc').value = '';
  document.getElementById('amount').value = '';
  if(myName) document.getElementById('paidBy').value = myName;
  customValues = {};
  setSplitMode('even');
  toast('Added to ledger');
}

function deleteExpense(id){
  deleteExpenseFromStore(id);
}

function getShare(e, person){
  if(e.splitType === 'custom' && e.splitAmounts){
    return e.splitAmounts[person] || 0;
  }
  return e.amount / e.splitAmong.length;
}

function computeBalances(list){
  list = list || expenses;
  const net = {};
  NAMES.forEach(p => {
    let paid = 0, share = 0;
    list.forEach(e => {
      const c = e.currency || '£';
      if(e.paidBy === p) paid += toUSD(e.amount, c);
      if(e.splitAmong.includes(p)) share += toUSD(getShare(e, p), c);
    });
    net[p] = paid - share;
  });

  // apply recorded settlements: payer's net goes up (less owed), receiver's net goes down (already paid in cash)
  settlements.forEach(s => {
    if(net[s.from] !== undefined) net[s.from] += s.amount;
    if(net[s.to] !== undefined) net[s.to] -= s.amount;
  });

  return { net };
}

// Every individual debt, traced back to the specific expense it came from.
// Nothing here is netted across the group — if Kayla paid for Marian twice,
// both of those show up as their own line items under Marian -> Kayla.
function buildDebtItems(list){
  list = list || expenses;
  const items = [];
  list.forEach(e => {
    const c = e.currency || '£';
    e.splitAmong.forEach(p => {
      if(p !== e.paidBy){
        items.push({
          itemId: e.id + '__' + p,
          desc: e.desc,
          from: p,
          to: e.paidBy,
          amount: toUSD(getShare(e, p), c),
          ts: e.ts
        });
      }
    });
  });
  return items;
}

function render(){
  renderTotals();
  renderHistory();
  renderSettle();
}

function renderTotals(){
  const totalUSD = expenses.reduce((sum, e) => sum + toUSD(e.amount, e.currency || '£'), 0);
  const strip = document.getElementById('totalsStrip');
  strip.innerHTML = `
    <div class="total-card">
      <p class="total-label">Total spent</p>
      <p class="total-value">${fmt(totalUSD, '$')}</p>
    </div>
    <div class="total-card">
      <p class="total-label">Expenses</p>
      <p class="total-value">${expenses.length}</p>
    </div>
  `;
}

function renderHistory(){
  const list = document.getElementById('historyList');
  if(expenses.length === 0){
    list.innerHTML = `<div class="empty">No expenses logged yet. Add your first one from the Add expense tab.</div>`;
    return;
  }
  const sorted = [...expenses].sort((a,b) => b.ts - a.ts);
  list.innerHTML = sorted.map(e => {
    const c = e.currency || '£';
    const isCustom = e.splitType === 'custom' && e.splitAmounts;
    const splitLine = isCustom
      ? e.splitAmong.map(n => `${n} ${fmt(getShare(e, n), c)}`).join(', ')
      : e.splitAmong.join(', ');
    const sideLabel = isCustom
      ? `<span class="stub-each">custom split</span>`
      : `<span class="stub-each">${fmt(e.amount / e.splitAmong.length, c)} each</span>`;
    return `
      <div class="stub">
        <button class="del-btn" onclick="deleteExpense('${e.id}')" aria-label="Delete">&#10005;</button>
        <div class="stub-main">
          <p class="stub-date">${fmtDate(e.ts)}</p>
          <p class="stub-desc">${escapeHtml(e.desc)}</p>
          <p class="stub-paidby">${e.paidBy} paid</p>
          <p class="stub-splitline">Split: <span class="split-names">${splitLine}</span></p>
        </div>
        <div class="stub-split">
          <span class="stub-amount">${fmt(e.amount, c)}</span>
          ${sideLabel}
        </div>
      </div>
    `;
  }).join('');
}

function renderSettle(){
  const settleList = document.getElementById('settleList');
  const balanceList = document.getElementById('balanceList');

  if(expenses.length === 0){
    settleList.innerHTML = `<div class="empty">Nothing to settle yet.</div>`;
    balanceList.innerHTML = '';
    return;
  }

  const { net } = computeBalances(expenses);
  const items = buildDebtItems(expenses);
  const settledIds = new Set(settlements.map(s => s.id));

  const groups = {};
  items.forEach(it => {
    const key = it.from + '||' + it.to;
    if(!groups[key]) groups[key] = { from: it.from, to: it.to, items: [] };
    groups[key].items.push(it);
  });

  const groupKeys = Object.keys(groups).filter(key => {
    const activeTotal = groups[key].items.reduce((s, it) => s + (settledIds.has(it.itemId) ? 0 : it.amount), 0);
    return activeTotal > 0.005;
  });

  settleList.innerHTML = `<p class="section-label">Settle up (converted to USD)</p>`;

  if(groupKeys.length === 0){
    settleList.innerHTML += `<div class="settled-msg">Everyone's square.</div>`;
  } else {
    settleList.innerHTML += groupKeys.map(key => {
      const g = groups[key];
      const activeTotal = g.items.reduce((s, it) => s + (settledIds.has(it.itemId) ? 0 : it.amount), 0);
      const itemsHtml = g.items.slice().sort((a,b) => b.ts - a.ts).map(it => {
        const paid = settledIds.has(it.itemId);
        return `
          <div class="debt-item${paid ? ' paid' : ''}">
            <div class="debt-item-info">
              <span class="debt-item-desc">${escapeHtml(it.desc)}</span>
              <span class="debt-item-date">${fmtDate(it.ts)}</span>
            </div>
            <span class="debt-item-amount">${fmt(it.amount, '$')}</span>
            ${paid
              ? `<button class="undo-btn" onclick="undoItemPaid('${it.itemId}')">Undo</button>`
              : `<button class="pay-btn small" onclick="markItemPaid('${it.itemId}','${it.from}','${it.to}',${it.amount.toFixed(2)})">Mark as paid</button>`
            }
          </div>
        `;
      }).join('');
      return `
        <details class="debt-group">
          <summary class="debt-group-summary">
            <span>${g.from}</span>
            <span class="arrow">&#8594;</span>
            <span>${g.to}</span>
            <span class="board-amount">${fmt(activeTotal, '$')}</span>
            <button class="pay-btn" onclick="markGroupPaid(event, '${g.from}', '${g.to}')">Mark all as paid</button>
          </summary>
          <div class="debt-group-items">${itemsHtml}</div>
        </details>
      `;
    }).join('');
  }

  const paidItems = items.filter(it => settledIds.has(it.itemId));
  if(paidItems.length > 0){
    settleList.innerHTML += `<p class="section-label">Payment history</p>` + paidItems
      .slice()
      .sort((a,b) => {
        const sa = settlements.find(s => s.id === a.itemId);
        const sb = settlements.find(s => s.id === b.itemId);
        return (sb ? sb.ts : 0) - (sa ? sa.ts : 0);
      })
      .map(it => `
        <div class="settled-row">
          <span>${it.from} paid ${it.to} ${fmt(it.amount, '$')} — ${escapeHtml(it.desc)}</span>
          <button class="undo-btn" onclick="undoItemPaid('${it.itemId}')">Undo</button>
        </div>
      `).join('');
  }

  balanceList.innerHTML = `<p class="section-label">Net position (USD)</p>` + NAMES.map(p => {
    const v = net[p];
    const cls = v >= 0 ? 'balance-pos' : 'balance-neg';
    const label = v >= 0 ? `is owed ${fmt(v, '$')}` : `owes ${fmt(-v, '$')}`;
    return `<div class="balance-item"><span>${p}</span><span class="${cls}">${label}</span></div>`;
  }).join('');
}

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    ['add','history','settle'].forEach(t => {
      document.getElementById('panel-' + t).style.display = (t === btn.dataset.tab) ? 'block' : 'none';
    });
  });
});

document.getElementById('addBtn').addEventListener('click', addExpense);
document.getElementById('clearBtn').addEventListener('click', () => {
  document.getElementById('desc').value = '';
  document.getElementById('amount').value = '';
  customValues = {};
  setSplitMode('even');
});

initTravelers();
loadExpenses();
loadProfile();
fetchExchangeRates();
</script>
</body>
</html>

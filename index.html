<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Trip Split</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Trip Split">
<meta name="theme-color" content="#4B3480">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/12.15.0/firebase-app-compat.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/12.15.0/firebase-firestore-compat.min.js"></script>
<style>
  :root{
    --navy:#4B3480;
    --navy-2:#5B4293;
    --cream:#F7F2FC;
    --cream-2:#EFE4F8;
    --amber:#E8829E;
    --amber-dark:#8C2F49;
    --teal:#6E9BE0;
    --teal-dark:#1F4C82;
    --coral:#E8829E;
    --coral-dark:#8C2F49;
    --ink:#3A2E5C;
    --muted:#7A7290;
    --line:rgba(75,52,128,0.14);
  }
  *{box-sizing:border-box;}
  body{margin:0;}
  .app{
    font-family:'Inter',sans-serif;
    background:var(--cream);
    color:var(--ink);
    min-height:100vh;
    padding-bottom:3rem;
  }
  .header{
    background:var(--navy);
    color:var(--cream);
    padding:1.75rem 1.5rem 2.25rem;
    position:relative;
    overflow:hidden;
  }
  .header::after{
    content:"";
    position:absolute;
    left:0; right:0; bottom:0;
    height:14px;
    background-image:radial-gradient(circle, var(--cream) 4px, transparent 4.5px);
    background-size:22px 14px;
    background-position:8px 6px;
    background-repeat:repeat-x;
  }
  .eyebrow{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--amber);
    margin:0 0 6px;
  }
  .trip-title{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:28px;
    margin:0 0 14px;
  }
  .traveler-row{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
  }
  .chip{
    font-family:'IBM Plex Mono',monospace;
    font-size:12.5px;
    padding:5px 11px;
    border-radius:999px;
    background:rgba(246,241,228,0.1);
    border:1px solid rgba(246,241,228,0.28);
  }
  .totals-strip{
    display:flex;
    gap:10px;
    padding:14px 1.5rem 0;
    margin-top:-1px;
    overflow-x:auto;
  }
  .total-card{
    flex:1;
    min-width:110px;
    background:#fff;
    border:1px solid var(--line);
    border-radius:10px;
    padding:10px 12px;
  }
  .total-label{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.06em;
    color:var(--muted);
    margin:0 0 3px;
  }
  .total-value{
    font-family:'IBM Plex Mono',monospace;
    font-weight:600;
    font-size:17px;
    margin:0;
    color:var(--teal-dark);
  }
  .tabs{
    display:flex;
    gap:4px;
    padding:1.25rem 1.5rem 0;
  }
  .tab-btn{
    font-family:'Space Grotesk',sans-serif;
    font-weight:500;
    font-size:14px;
    padding:9px 16px;
    border:none;
    background:transparent;
    color:var(--muted);
    cursor:pointer;
    border-radius:8px 8px 0 0;
    border-bottom:2px solid transparent;
  }
  .tab-btn.active{
    color:var(--navy);
    border-bottom:2px solid var(--amber);
    background:var(--cream-2);
  }
  .panel{
    padding:1.25rem 1.5rem 0;
  }
  .card{
    background:#fff;
    border:1px solid var(--line);
    border-radius:12px;
    padding:1.1rem 1.2rem;
  }
  .field{
    margin-bottom:14px;
  }
  .field label{
    display:block;
    font-size:12.5px;
    font-weight:500;
    color:var(--muted);
    margin-bottom:6px;
  }
  .field input[type="text"], .field input[type="number"], .field select{
    width:100%;
    padding:9px 11px;
    font-size:14.5px;
    font-family:'Inter',sans-serif;
    border:1px solid var(--line);
    border-radius:8px;
    background:var(--cream);
    color:var(--ink);
  }
  .field input:focus, .field select:focus{
    outline:none;
    border-color:var(--amber);
  }
  .amount-row{
    display:flex;
    gap:8px;
  }
  .amount-row select{
    width:100px;
    flex-shrink:0;
    padding:9px 8px;
    font-size:14px;
    font-family:'Inter',sans-serif;
    border:1px solid var(--line);
    border-radius:8px;
    background:var(--cream);
    color:var(--ink);
  }
  .amount-row input{
    flex:1;
  }
  .check-grid{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
  }
  .check-pill{
    display:flex;
    align-items:center;
    gap:6px;
    font-size:13.5px;
    padding:7px 12px;
    border-radius:999px;
    border:1px solid var(--line);
    background:var(--cream);
    cursor:pointer;
    user-select:none;
  }
  .check-pill.on{
    background:var(--navy);
    color:var(--cream);
    border-color:var(--navy);
  }
  .check-pill input{display:none;}
  .split-toggle{
    display:flex;
    gap:8px;
    margin-bottom:10px;
  }
  .split-toggle-btn{
    flex:1;
    font-family:'Inter',sans-serif;
    font-size:13px;
    font-weight:500;
    padding:8px 10px;
    border-radius:8px;
    border:1px solid var(--line);
    background:var(--cream);
    color:var(--muted);
    cursor:pointer;
  }
  .split-toggle-btn.active{
    background:var(--navy);
    border-color:var(--navy);
    color:var(--cream);
  }
